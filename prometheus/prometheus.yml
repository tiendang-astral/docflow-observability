global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'docai'
    env: 'production'

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

scrape_configs:
  # Backend API
  - job_name: 'docai-backend'
    static_configs:
      - targets: ['docflow-backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Platform worker
  - job_name: 'docai-platform-worker'
    static_configs:
      - targets: ['docflow-platform-worker:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 5s

  # Docprocess worker
  - job_name: 'docai-docprocess-worker'
    static_configs:
      - targets: ['docprocess-worker:8002']
    metrics_path: '/healthz'
    scrape_interval: 30s
    scrape_timeout: 5s

  # Node Exporter (host CPU, RAM, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    scrape_timeout: 5s

  # PostgreSQL exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
